<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Gerador de Rostos IA</title>

    <style>
      body {
        margin: 0;
        background: #0f172a;
        font-family: Arial;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      h1 {
        margin-bottom: 20px;
      }

      img {
        width: 350px;
        height: 350px;
        border-radius: 20px;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
      }

      button {
        margin-top: 20px;
        padding: 12px 20px;
        border: none;
        border-radius: 10px;
        background: #22c55e;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background: #16a34a;
      }
    </style>
  </head>

  <body>
    <h1>Gerador de Pessoa que Não Existe</h1>

    <img id="rosto" src="https://thispersondoesnotexist.com/image" />

    <button onclick="gerarRosto()">Gerar Novo Rosto</button>

    <script>
      function gerarRosto() {
        // força nova imagem (evita cache)
        const img = document.getElementById("rosto");

        img.src =
          "https://thispersondoesnotexist.com/image?" + new Date().getTime();
      }
    </script>
  </body>
</html>

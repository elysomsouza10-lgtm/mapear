<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Tracking Correto</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #0f172a;
      }
      video,
      canvas {
        position: absolute;
        transform: scaleX(-1);
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  </head>
  <body>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <script>
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      canvas.width = 640;
      canvas.height = 480;

      let desenhando = [];
      let cor = "cyan";
      let suavX = 0;
      let suavY = 0;

      function limpar() {
        desenhando = [];
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }

      // detectar mão fechada
      function maoFechada(l) {
        return (
          l[8].y > l[6].y &&
          l[12].y > l[10].y &&
          l[16].y > l[14].y &&
          l[20].y > l[18].y
        );
      }
      // dedo indicador levantado
      function dedoIndicador(l) {
        return l[8].y < l[6].y;
      }
      // gesto pinça
      function pinça(l) {
        let dx = l[4].x - l[8].x;
        let dy = l[4].y - l[8].y;
        return Math.sqrt(dx * dx + dy * dy) < 0.05;
      }

      const hands = new Hands({
        locateFile: (file) =>
          `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
      });
      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 0,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6,
      });

      hands.onResults((results) => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (results.multiHandLandmarks) {
          for (const l of results.multiHandLandmarks) {
            if (maoFechada(l)) limpar();

            const indicador = l[8];
            let x = indicador.x * canvas.width; // NÃO inverter eixo
            let y = indicador.y * canvas.height;

            // suavização leve
            suavX = suavX * 0.85 + x * 0.15;
            suavY = suavY * 0.85 + y * 0.15;

            if (dedoIndicador(l)) desenhando.push({ x: suavX, y: suavY });

            // desenhar linhas
            ctx.beginPath();
            for (let i = 0; i < desenhando.length; i++) {
              ctx.lineTo(desenhando[i].x, desenhando[i].y);
            }
            ctx.strokeStyle = cor;
            ctx.lineWidth = 4;
            ctx.stroke();

            // mover objeto com pinça
            if (pinça(l)) {
              document
                .getElementById("objeto")
                ?.style.setProperty("left", suavX + "px");
              document
                .getElementById("objeto")
                ?.style.setProperty("top", suavY + "px");
            }

            // desenhar pontos da mão
            for (const p of l) {
              ctx.beginPath();
              ctx.arc(
                p.x * canvas.width,
                p.y * canvas.height,
                5,
                0,
                Math.PI * 2,
              );
              ctx.fillStyle = "lime";
              ctx.fill();
            }
          }
        }
      });

      const camera = new Camera(video, {
        onFrame: async () => {
          await hands.send({ image: video });
        },
        width: 640,
        height: 480,
      });
      camera.start();
    </script>
  </body>
</html>

<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeepFace + Mãos</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <style>
      body {
        margin: 0;
        background: #0f172a;
        overflow: hidden;
        color: white;
        font-family: Arial;
      }
      video,
      canvas {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
      }
      #objeto {
        position: absolute;
        width: 60px;
        height: 60px;
        background: red;
        border-radius: 10px;
        top: 200px;
        left: 200px;
      }
      .menu {
        position: absolute;
        bottom: 20px;
        left: 20px;
        z-index: 10;
      }
      button {
        padding: 10px 15px;
        margin: 5px;
        border: none;
        border-radius: 10px;
        background: #22c55e;
        color: white;
        font-size: 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="menu">
      <button onclick="cor = 'cyan'">Azul</button>
      <button onclick="cor = 'red'">Vermelho</button>
      <button onclick="cor = 'yellow'">Amarelo</button>
      <button onclick="limpar()">Limpar</button>
      <button onclick="salvar()">Salvar</button>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div id="objeto"></div>

    <script>
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const objeto = document.getElementById("objeto");

      canvas.width = 640;
      canvas.height = 480;

      let desenhando = [];
      let cor = "cyan";
      let suavX = 0,
        suavY = 0;

      // Funções básicas
      function limpar() {
        desenhando = [];
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
      function salvar() {
        let link = document.createElement("a");
        link.download = "desenho.png";
        link.href = canvas.toDataURL();
        link.click();
      }

      // Funções de gesto
      function maoFechada(l) {
        return (
          l[8].y > l[6].y &&
          l[12].y > l[10].y &&
          l[16].y > l[14].y &&
          l[20].y > l[18].y
        );
      }
      function dedoIndicador(l) {
        return l[8].y < l[6].y;
      }
      function pinça(l) {
        return Math.hypot(l[4].x - l[8].x, l[4].y - l[8].y) < 0.05;
      }

      // Hands
      const hands = new Hands({
        locateFile: (file) =>
          `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
      });
      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 0,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6,
      });

      // Face Mesh
      const faceMesh = new FaceMesh({
        locateFile: (file) =>
          `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`,
      });
      faceMesh.setOptions({
        maxNumFaces: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5,
      });

      // Combina resultados
      hands.onResults((results) => {
        desenhar(results.multiHandLandmarks, results);
      });

      faceMesh.onResults((results) => {
        desenharFace(results.multiFaceLandmarks);
      });

      // Desenho das mãos
      function desenhar(multiLandmarks) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (multiLandmarks) {
          for (const l of multiLandmarks) {
            if (maoFechada(l)) limpar();
            const indicador = l[8];
            let x = indicador.x * canvas.width;
            let y = indicador.y * canvas.height;
            suavX = suavX * 0.85 + x * 0.15;
            suavY = suavY * 0.85 + y * 0.15;

            if (dedoIndicador(l)) desenhando.push({ x: suavX, y: suavY });

            ctx.beginPath();
            for (let i = 0; i < desenhando.length; i++)
              ctx.lineTo(desenhando[i].x, desenhando[i].y);
            ctx.strokeStyle = cor;
            ctx.lineWidth = 4;
            ctx.stroke();

            if (pinça(l)) {
              objeto.style.left = suavX + "px";
              objeto.style.top = suavY + "px";
            }

            // pontos da mão
            for (const p of l) {
              ctx.beginPath();
              ctx.arc(
                p.x * canvas.width,
                p.y * canvas.height,
                5,
                0,
                Math.PI * 2,
              );
              ctx.fillStyle = "lime";
              ctx.fill();
            }
          }
        }
      }

      // Desenho do rosto (máscara/emoji)
      function desenharFace(multiFaceLandmarks) {
        if (!multiFaceLandmarks) return;
        for (const face of multiFaceLandmarks) {
          // pegar olhos ou boca
          const esquerda = face[33],
            direita = face[263];
          const centro = (face[168].y + face[8].y) / 2;
          ctx.beginPath();
          // máscara simples: elipse sobre a boca
          const cx = ((esquerda.x + direita.x) / 2) * canvas.width;
          const cy = centro * canvas.height;
          ctx.fillStyle = "rgba(255,0,255,0.3)";
          ctx.ellipse(cx, cy, 50, 30, 0, 0, 2 * Math.PI);
          ctx.fill();
        }
      }

      // Câmera
      const camera = new Camera(video, {
        onFrame: async () => {
          await hands.send({ image: video });
          await faceMesh.send({ image: video });
        },
        width: 640,
        height: 480,
      });
      camera.start();
    </script>
  </body>
</html>

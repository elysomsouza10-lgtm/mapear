<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desenhar com a mão</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #0f172a;
      }

      video,
      canvas {
        position: absolute;
        width: 100%;
        height: 100%;
        transform: scaleX(-1);
      }
    </style>
  </head>

  <body>
    <video id="video" autoplay playsinline></video>

    <!-- canvas do desenho -->
    <canvas id="desenho"></canvas>

    <!-- canvas da interface -->
    <canvas id="interface"></canvas>

    <script>
      // elementos da tela

      const video = document.getElementById("video");

      const telaDesenho = document.getElementById("desenho");
      const ctxDesenho = telaDesenho.getContext("2d");

      const telaUI = document.getElementById("interface");
      const ctxUI = telaUI.getContext("2d");

      // tamanho dos canvas

      telaDesenho.width = telaUI.width = window.innerWidth;
      telaDesenho.height = telaUI.height = window.innerHeight;

      // controle do desenho

      let podeDesenhar = false;
      let desenhando = false;
      let ultimoX = 0;
      let ultimoY = 0;

      // posição dos botões

      const botaoLigar = { x: 80, y: 80, r: 40 };
      const botaoDesligar = { x: 200, y: 80, r: 40 };

      // dedo indicador levantado

      function dedoIndicador(mao) {
        return mao[8].y < mao[6].y;
      }

      // detectar mão fechada

      function maoFechada(mao) {
        let indicador = mao[8].y > mao[6].y;
        let medio = mao[12].y > mao[10].y;
        let anelar = mao[16].y > mao[14].y;
        let mindinho = mao[20].y > mao[18].y;

        return indicador && medio && anelar && mindinho;
      }

      // detectar toque em botão

      function encostou(px, py, botao) {
        let dx = px - botao.x;
        let dy = py - botao.y;

        let distancia = Math.sqrt(dx * dx + dy * dy);

        return distancia < botao.r;
      }

      // config do detector de mãos

      const hands = new Hands({
        locateFile: (file) => {
          return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        },
      });

      hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7,
      });

      // quando detectar mãos

      hands.onResults((resultado) => {
        ctxUI.clearRect(0, 0, telaUI.width, telaUI.height);

        // botão verde

        ctxUI.beginPath();
        ctxUI.arc(botaoLigar.x, botaoLigar.y, botaoLigar.r, 0, Math.PI * 2);
        ctxUI.fillStyle = "green";
        ctxUI.fill();

        // botão vermelho

        ctxUI.beginPath();
        ctxUI.arc(
          botaoDesligar.x,
          botaoDesligar.y,
          botaoDesligar.r,
          0,
          Math.PI * 2,
        );
        ctxUI.fillStyle = "red";
        ctxUI.fill();

        // verificar mãos

        if (resultado.multiHandLandmarks) {
          for (const mao of resultado.multiHandLandmarks) {
            // posição do dedo indicador

            let dedo = mao[8];

            let x = dedo.x * telaDesenho.width;
            let y = dedo.y * telaDesenho.height;

            // apagar desenho com mão fechada

            if (maoFechada(mao)) {
              ctxDesenho.clearRect(0, 0, telaDesenho.width, telaDesenho.height);
            }

            // ativar desenho

            if (encostou(x, y, botaoLigar)) {
              podeDesenhar = true;
            }

            // desativar desenho

            if (encostou(x, y, botaoDesligar)) {
              podeDesenhar = false;
            }

            // desenhar linha

            if (podeDesenhar && dedoIndicador(mao)) {
              if (!desenhando) {
                ultimoX = x;
                ultimoY = y;
                desenhando = true;
              }

              ctxDesenho.beginPath();
              ctxDesenho.moveTo(ultimoX, ultimoY);
              ctxDesenho.lineTo(x, y);

              ctxDesenho.strokeStyle = "cyan";
              ctxDesenho.lineWidth = 6;
              ctxDesenho.lineCap = "round";
              ctxDesenho.stroke();

              ultimoX = x;
              ultimoY = y;
            } else {
              desenhando = false;
            }

            // desenhar esqueleto da mão

            drawConnectors(ctxUI, mao, HAND_CONNECTIONS, {
              color: "#00ff88",
              lineWidth: 3,
            });

            drawLandmarks(ctxUI, mao, {
              color: "#ff0000",
              radius: 2,
            });
          }
        }
      });

      // iniciar câmera

      const camera = new Camera(video, {
        onFrame: async () => {
          await hands.send({ image: video });
        },
        width: 640,
        height: 480,
      });

      camera.start();
    </script>
  </body>
</html>

<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>IA Gestos com Mão</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <style>
      body {
        margin: 0;
        background: #0f172a;
        color: white;
        font-family: Arial;
        overflow: hidden;
      }

      h1 {
        position: absolute;
        top: 10px;
        left: 20px;
        z-index: 10;
      }

      .container {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      video {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
      }

      canvas {
        position: absolute;
        width: 100%;
        height: 100%;
      }

      #objeto {
        position: absolute;
        width: 60px;
        height: 60px;
        background: red;
        border-radius: 10px;
        top: 200px;
        left: 200px;
      }

      .menu {
        position: absolute;
        bottom: 20px;
        left: 20px;
        z-index: 10;
      }

      button {
        padding: 10px 15px;
        margin: 5px;
        border: none;
        border-radius: 10px;
        background: #22c55e;
        color: white;
        font-size: 14px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <h1>Controle por Gestos</h1>

    <div class="container">
      <video id="video" autoplay playsinline></video>

      <canvas id="canvas"></canvas>

      <div id="objeto"></div>
    </div>

    <div class="menu">
      <button onclick="cor = 'cyan'">Azul</button>
      <button onclick="cor = 'red'">Vermelho</button>
      <button onclick="cor = 'yellow'">Amarelo</button>

      <button onclick="limpar()">Limpar</button>
      <button onclick="salvar()">Salvar</button>
    </div>

    <script>
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const objeto = document.getElementById("objeto");

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      let desenhando = [];
      let cor = "cyan";

      let suavX = 0;
      let suavY = 0;

      function limpar() {
        desenhando = [];
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }

      function salvar() {
        let link = document.createElement("a");
        link.download = "desenho.png";
        link.href = canvas.toDataURL();
        link.click();
      }

      // detectar mão fechada
      function maoFechada(landmarks) {
        return (
          landmarks[8].y > landmarks[6].y &&
          landmarks[12].y > landmarks[10].y &&
          landmarks[16].y > landmarks[14].y &&
          landmarks[20].y > landmarks[18].y
        );
      }

      // dedo indicador levantado
      function dedoIndicador(landmarks) {
        return landmarks[8].y < landmarks[6].y;
      }

      // gesto pinça
      function pinça(landmarks) {
        let polegar = landmarks[4];
        let indicador = landmarks[8];

        let dx = polegar.x - indicador.x;
        let dy = polegar.y - indicador.y;

        let distancia = Math.sqrt(dx * dx + dy * dy);

        return distancia < 0.05;
      }

      const hands = new Hands({
        locateFile: (file) => {
          return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        },
      });

      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 0,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6,
      });

      hands.onResults((results) => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (results.multiHandLandmarks) {
          for (const landmarks of results.multiHandLandmarks) {
            if (maoFechada(landmarks)) {
              limpar();
              return;
            }

            const indicador = landmarks[8];

            let x = (1 - indicador.x) * canvas.width;
            let y = indicador.y * canvas.height;

            suavX = suavX * 0.7 + x * 0.3;
            suavY = suavY * 0.7 + y * 0.3;

            if (dedoIndicador(landmarks)) {
              desenhando.push({ x: suavX, y: suavY });
            }

            ctx.beginPath();

            for (let i = 0; i < desenhando.length; i++) {
              ctx.lineTo(desenhando[i].x, desenhando[i].y);
            }

            ctx.strokeStyle = cor;
            ctx.lineWidth = 4;
            ctx.stroke();

            // mover objeto com pinça

            if (pinça(landmarks)) {
              objeto.style.left = suavX + "px";
              objeto.style.top = suavY + "px";
            }

            // desenhar pontos da mão

            for (const ponto of landmarks) {
              const px = (1 - ponto.x) * canvas.width;
              const py = ponto.y * canvas.height;

              ctx.beginPath();
              ctx.arc(px, py, 5, 0, Math.PI * 2);
              ctx.fillStyle = "lime";
              ctx.fill();
            }
          }
        }
      });

      const camera = new Camera(video, {
        onFrame: async () => {
          await hands.send({ image: video });
        },

        width: 640,
        height: 480,
      });

      camera.start();
    </script>
  </body>
</html>

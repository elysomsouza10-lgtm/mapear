<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Gestos com Partículas</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
      body {
        margin: 0;
        background: #0f172a;
        overflow: hidden;
        font-family: Arial;
        color: white;
      }

      video {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
      }

      canvas {
        position: absolute;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      let suavX = 0;
      let suavY = 0;

      let particulas = [];

      function criarParticulas(x, y) {
        for (let i = 0; i < 6; i++) {
          let angulo = Math.random() * Math.PI * 2;
          let velocidade = Math.random() * 3;

          particulas.push({
            x: x,
            y: y,
            vx: Math.cos(angulo) * velocidade,
            vy: Math.sin(angulo) * velocidade,
            vida: 20,
            tamanho: Math.random() * 4 + 2,
          });
        }
      }

      function atualizarParticulas() {
        for (let i = particulas.length - 1; i >= 0; i--) {
          let p = particulas[i];

          p.x += p.vx;
          p.y += p.vy;
          p.vida--;

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.tamanho, 0, Math.PI * 2);
          ctx.fillStyle = "cyan";
          ctx.fill();

          if (p.vida <= 0) {
            particulas.splice(i, 1);
          }
        }
      }

      const hands = new Hands({
        locateFile: (file) => {
          return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        },
      });

      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 0,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6,
      });

      hands.onResults((results) => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (results.multiHandLandmarks) {
          for (const landmarks of results.multiHandLandmarks) {
            const indicador = landmarks[8];

            let x = (1 - indicador.x) * canvas.width;
            let y = indicador.y * canvas.height;

            const suavidade = 0.3;

            suavX += (x - suavX) * suavidade;
            suavY += (y - suavY) * suavidade;

            criarParticulas(suavX, suavY);

            for (const ponto of landmarks) {
              const px = (1 - ponto.x) * canvas.width;
              const py = ponto.y * canvas.height;

              ctx.beginPath();
              ctx.arc(px, py, 4, 0, Math.PI * 2);
              ctx.fillStyle = "lime";
              ctx.fill();
            }
          }
        }

        atualizarParticulas();
      });

      const camera = new Camera(video, {
        onFrame: async () => {
          await hands.send({ image: video });
        },

        width: 640,
        height: 480,
      });

      camera.start();
    </script>
  </body>
</html>

<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>mapear</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #0f172a;
      }

      video,
      canvas {
        position: absolute;
        width: 100%;
        height: 100%;
      }

      #ui {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 10;
        display: flex;
        gap: 10px;
      }

      button {
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #22c55e;
        color: white;
        cursor: pointer;
      }

      button.off {
        background: #ef4444;
      }
    </style>
  </head>

  <body>
    <div id="ui">
      <button id="toggleDraw">Desenho: ON</button>
      <button id="clear">Limpar</button>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="drawCanvas"></canvas>
    <canvas id="canvas"></canvas>

    <script>
      const video = document.getElementById("video");

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      const drawCanvas = document.getElementById("drawCanvas");
      const drawCtx = drawCanvas.getContext("2d");

      canvas.width = drawCanvas.width = window.innerWidth;
      canvas.height = drawCanvas.height = window.innerHeight;

      // ===== CONTROLE =====
      let drawEnabled = true;

      const toggleBtn = document.getElementById("toggleDraw");
      const clearBtn = document.getElementById("clear");

      toggleBtn.onclick = () => {
        drawEnabled = !drawEnabled;
        toggleBtn.textContent = drawEnabled ? "Desenho: ON" : "Desenho: OFF";
        toggleBtn.classList.toggle("off");
      };

      clearBtn.onclick = () => {
        drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
      };

      // ===== PET =====
      let pet = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        targetX: canvas.width / 2,
        targetY: canvas.height / 2,
        vx: 0,
        vy: 0,
        angle: 0,
        size: 40,
      };

      // ===== PINCEL PRO =====
      let points = [];
      let smoothX = 0;
      let smoothY = 0;

      function drawBrush(x, y) {
        smoothX = smoothX * 0.5 + x * 0.5;
        smoothY = smoothY * 0.5 + y * 0.5;

        points.push({ x: smoothX, y: smoothY });
        if (points.length > 25) points.shift();
        if (points.length < 3) return;

        drawCtx.beginPath();
        drawCtx.moveTo(points[0].x, points[0].y);

        for (let i = 1; i < points.length - 2; i++) {
          let xc = (points[i].x + points[i + 1].x) / 2;
          let yc = (points[i].y + points[i + 1].y) / 2;
          drawCtx.quadraticCurveTo(points[i].x, points[i].y, xc, yc);
        }

        let dx = points[points.length - 1].x - points[points.length - 2].x;
        let dy = points[points.length - 1].y - points[points.length - 2].y;
        let speed = Math.sqrt(dx * dx + dy * dy);

        let thickness = Math.max(2, 12 - speed);
        let alpha = Math.min(1, 0.3 + speed * 0.08);

        drawCtx.lineWidth = thickness;
        drawCtx.strokeStyle = `rgba(34,211,238,${alpha})`;
        drawCtx.lineCap = "round";

        drawCtx.shadowBlur = 10;
        drawCtx.shadowColor = "#22d3ee";

        drawCtx.stroke();
        drawCtx.shadowBlur = 0;
      }

      // ===== GESTOS =====
      function pinch(m) {
        let dx = m[8].x - m[4].x;
        let dy = m[8].y - m[4].y;
        return Math.sqrt(dx * dx + dy * dy) < 0.06;
      }

      function dedoIndicador(m) {
        return m[8].y < m[6].y;
      }

      function maoFechada(m) {
        return (
          m[8].y > m[6].y &&
          m[12].y > m[10].y &&
          m[16].y > m[14].y &&
          m[20].y > m[18].y
        );
      }

      // ===== ANIMAÇÃO PET =====
      let blink = 0;
      let blinkTimer = 0;

      function updatePet() {
        let dx = pet.targetX - pet.x;
        let dy = pet.targetY - pet.y;

        pet.vx += dx * 0.02;
        pet.vy += dy * 0.02;

        pet.vx *= 0.85;
        pet.vy *= 0.85;

        pet.x += pet.vx;
        pet.y += pet.vy;

        pet.angle = Math.atan2(pet.vy, pet.vx);

        blinkTimer++;
        if (blinkTimer > 100) {
          blink = 1;
          if (blinkTimer > 110) {
            blink = 0;
            blinkTimer = 0;
          }
        }
      }

      function drawPet() {
        ctx.save();
        ctx.translate(pet.x, pet.y);
        ctx.rotate(pet.angle * 0.2);

        let breathe = Math.sin(Date.now() * 0.005) * 2;

        // corpo
        ctx.fillStyle = "#22d3ee";
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#22d3ee";

        ctx.beginPath();
        ctx.ellipse(
          0,
          0,
          pet.size + breathe,
          pet.size * 0.8 + breathe,
          0,
          0,
          Math.PI * 2,
        );
        ctx.fill();

        ctx.shadowBlur = 0;

        // orelhas
        ctx.fillStyle = "#06b6d4";
        ctx.beginPath();
        ctx.ellipse(-20, -25, 10, 15, -0.3, 0, Math.PI * 2);
        ctx.ellipse(20, -25, 10, 15, 0.3, 0, Math.PI * 2);
        ctx.fill();

        // olhos
        let eyeX = (pet.targetX - pet.x) * 0.02;
        let eyeY = (pet.targetY - pet.y) * 0.02;

        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.ellipse(-12, -5, 8, 10 - blink * 10, 0, 0, Math.PI * 2);
        ctx.ellipse(12, -5, 8, 10 - blink * 10, 0, 0, Math.PI * 2);
        ctx.fill();

        // pupilas
        ctx.fillStyle = "black";
        ctx.beginPath();
        ctx.arc(-12 + eyeX, -5 + eyeY, 3, 0, Math.PI * 2);
        ctx.arc(12 + eyeX, -5 + eyeY, 3, 0, Math.PI * 2);
        ctx.fill();

        // boca
        ctx.strokeStyle = "#0f172a";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 10, 10, 0, Math.PI);
        ctx.stroke();

        ctx.restore();
      }

      // ===== MEDIAPIPE =====
      const hands = new Hands({
        locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`,
      });

      hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 0,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6,
      });

      let wasPinching = false;

      hands.onResults((res) => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (res.multiHandLandmarks && res.multiHandLandmarks.length) {
          const m = res.multiHandLandmarks[0];

          let x = m[8].x * canvas.width;
          let y = m[8].y * canvas.height;

          drawConnectors(ctx, m, HAND_CONNECTIONS, { color: "#00ff88" });
          drawLandmarks(ctx, m, { color: "#ff0000" });

          // apagar
          if (maoFechada(m)) {
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
          }

          // desenhar
          if (drawEnabled && dedoIndicador(m)) {
            drawBrush(x, y);
          } else {
            points = [];
          }

          // mover pet
          let isPinching = pinch(m);
          if (isPinching && !wasPinching) {
            pet.targetX = x;
            pet.targetY = y;
          }

          wasPinching = isPinching;
        }

        updatePet();
        drawPet();
      });

      // ===== CAMERA =====
      const camera = new Camera(video, {
        onFrame: async () => {
          await hands.send({ image: video });
        },
        width: 480,
        height: 360,
      });

      camera.start();
    </script>
  </body>
</html>

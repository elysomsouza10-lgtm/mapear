<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>IA Mapeamento de Mão</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <style>
      body {
        background: #0f172a;
        color: white;
        font-family: Arial;
        text-align: center;
      }

      h1 {
        margin-top: 10px;
      }

      .container {
        position: relative;
        width: 640px;
        margin: auto;
      }

      video {
        transform: scaleX(-1);
        width: 640px;
        height: 480px;
      }

      canvas {
        position: absolute;
        left: 0;
        top: 0;
      }

      #objeto {
        position: absolute;
        width: 60px;
        height: 60px;
        background: red;
        border-radius: 10px;
        top: 200px;
        left: 200px;
      }

      button {
        margin-top: 15px;
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        background: #22c55e;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <h1>IA de Mapeamento de Mão</h1>

    <div class="container">
      <video id="video" autoplay playsinline></video>

      <canvas id="canvas"></canvas>

      <div id="objeto"></div>
    </div>

    <button onclick="limpar()">Limpar desenho</button>

    <script>
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const objeto = document.getElementById("objeto");

      canvas.width = 640;
      canvas.height = 480;

      let desenhando = [];

      function limpar() {
        desenhando = [];
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }

      const hands = new Hands({
        locateFile: (file) => {
          return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        },
      });

      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7,
      });

      hands.onResults((results) => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (results.multiHandLandmarks) {
          for (const landmarks of results.multiHandLandmarks) {
            const indicador = landmarks[8];

            const x = indicador.x * canvas.width;
            const y = indicador.y * canvas.height;

            // salvar desenho
            desenhando.push({ x, y });

            // desenhar linha
            ctx.beginPath();

            for (let i = 0; i < desenhando.length; i++) {
              ctx.lineTo(desenhando[i].x, desenhando[i].y);
            }

            ctx.strokeStyle = "cyan";
            ctx.lineWidth = 4;
            ctx.stroke();

            // mover objeto
            objeto.style.left = x + "px";
            objeto.style.top = y + "px";

            // desenhar ponto da mão
            for (const ponto of landmarks) {
              const px = ponto.x * canvas.width;
              const py = ponto.y * canvas.height;

              ctx.beginPath();
              ctx.arc(px, py, 5, 0, Math.PI * 2);
              ctx.fillStyle = "lime";
              ctx.fill();
            }
          }
        }
      });

      const camera = new Camera(video, {
        onFrame: async () => {
          await hands.send({ image: video });
        },
        width: 640,
        height: 480,
      });

      camera.start();
    </script>
  </body>
</html>

<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Gesture AI</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: black;
      }

      video {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
      }

      canvas {
        position: absolute;
        top: 0;
        left: 0;
      }

      .menu {
        position: fixed;
        top: 20px;
        left: 20px;
        background: white;
        padding: 10px;
        border-radius: 10px;
      }
    </style>
  </head>

  <body>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <div class="menu">
      <button onclick="modo = 'draw'">Desenhar</button>
      <button onclick="modo = 'move'">Mover</button>
      <button onclick="limpar()">Limpar</button>
    </div>

    <script>
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      let modo = "draw";

      let desenhando = false;
      let lastX = 0;
      let lastY = 0;

      let objeto = {
        x: 300,
        y: 300,
        r: 40,
      };

      function limpar() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }

      navigator.mediaDevices
        .getUserMedia({
          video: { facingMode: "environment" },
        })
        .then((stream) => {
          video.srcObject = stream;
        });

      const hands = new Hands({
        locateFile: (file) => {
          return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        },
      });

      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6,
      });

      hands.onResults((results) => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // desenhar objeto
        ctx.beginPath();
        ctx.arc(objeto.x, objeto.y, objeto.r, 0, Math.PI * 2);
        ctx.fillStyle = "orange";
        ctx.fill();

        if (results.multiHandLandmarks) {
          for (const landmarks of results.multiHandLandmarks) {
            drawConnectors(ctx, landmarks, HAND_CONNECTIONS, {
              color: "#00FF00",
              lineWidth: 3,
            });

            drawLandmarks(ctx, landmarks, {
              color: "#FF0000",
              lineWidth: 2,
            });

            let indicador = landmarks[8];
            let polegar = landmarks[4];

            let x = indicador.x * canvas.width;
            let y = indicador.y * canvas.height;

            // cursor
            ctx.beginPath();
            ctx.arc(x, y, 10, 0, Math.PI * 2);
            ctx.fillStyle = "cyan";
            ctx.fill();

            let dx = indicador.x - polegar.x;
            let dy = indicador.y - polegar.y;
            let distancia = Math.sqrt(dx * dx + dy * dy);

            // gesto pinça
            if (distancia < 0.05) {
              if (modo === "draw") {
                if (!desenhando) {
                  desenhando = true;
                  lastX = x;
                  lastY = y;
                }

                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(x, y);
                ctx.strokeStyle = "yellow";
                ctx.lineWidth = 5;
                ctx.stroke();

                lastX = x;
                lastY = y;
              }

              if (modo === "move") {
                objeto.x = x;
                objeto.y = y;
              }
            } else {
              desenhando = false;
            }
          }
        }
      });

      const camera = new Camera(video, {
        onFrame: async () => {
          await hands.send({ image: video });
        },
        width: 640,
        height: 480,
      });
      hands.onResults((results) => {
        if (results.multiHandLandmarks) {
          draw(results.multiHandLandmarks);
        }
      });

      camera.start();
    </script>
  </body>
</html>

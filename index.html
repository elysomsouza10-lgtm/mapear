<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desenho com Mão e Som</title>
    <style>
      body {
        margin: 0;
        background: #111;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      canvas {
        position: absolute;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <video id="video" autoplay playsinline style="display: none"></video>
    <canvas id="canvas"></canvas>
    <audio
      id="sound"
      src="https://www.myinstants.com/media/sounds/tuturu.mp3"
    ></audio>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection"></script>

    <script>
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const sound = document.getElementById("sound");

      canvas.width = window.innerWidth * window.devicePixelRatio;
      canvas.height = window.innerHeight * window.devicePixelRatio;
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

      let lastX = null;
      let lastY = null;
      let frameCounter = 0;

      async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 320, height: 240 },
          audio: false,
        });
        video.srcObject = stream;
        return new Promise(
          (resolve) => (video.onloadedmetadata = () => resolve(video)),
        );
      }

      async function main() {
        await setupCamera();

        const model = handPoseDetection.SupportedModels.MediaPipeHands;
        const detector = await handPoseDetection.createDetector(model, {
          runtime: "tfjs",
          maxHands: 1,
          modelType: "lite",
        });

        async function detectHands() {
          frameCounter++;
          // Fade para efeito rastro
          ctx.fillStyle = "rgba(0,0,0,0.1)";
          ctx.fillRect(
            0,
            0,
            canvas.width / window.devicePixelRatio,
            canvas.height / window.devicePixelRatio,
          );

          if (frameCounter % 2 === 0) {
            const hands = await detector.estimateHands(video);
            if (hands.length > 0) {
              const keypoints = hands[0].keypoints;
              const indexFinger = keypoints.find(
                (p) => p.name === "index_finger_tip",
              );
              if (indexFinger) {
                const x =
                  (indexFinger.x * (canvas.width / video.videoWidth)) /
                  window.devicePixelRatio;
                const y =
                  (indexFinger.y * (canvas.height / video.videoHeight)) /
                  window.devicePixelRatio;

                // Desenha linha do movimento
                if (lastX !== null && lastY !== null) {
                  ctx.beginPath();
                  ctx.moveTo(lastX, lastY);
                  ctx.lineTo(x, y);
                  ctx.strokeStyle = "cyan";
                  ctx.lineWidth = 4;
                  ctx.stroke();
                }

                // Desenha círculo no dedo
                ctx.beginPath();
                ctx.arc(x, y, 8, 0, 2 * Math.PI);
                ctx.fillStyle = "magenta";
                ctx.fill();

                // Toca som se movimento rápido
                if (lastY !== null && Math.abs(y - lastY) > 40) {
                  sound.currentTime = 0;
                  sound.play();
                }

                lastX = x;
                lastY = y;
              }
            }
          }

          requestAnimationFrame(detectHands);
        }

        detectHands();
      }

      main();
    </script>
  </body>
</html>

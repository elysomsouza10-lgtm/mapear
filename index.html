<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Mão + Meme</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #000;
      }

      video {
        position: absolute;
        transform: scaleX(-1);
      }

      canvas {
        position: absolute;
        transform: scaleX(-1);
      }
    </style>
  </head>

  <body>
    <video class="input_video"></video>
    <canvas class="output_canvas"></canvas>

    <audio id="memeSound" src="vineboom.mp3"></audio>

    <script>
      const videoElement = document.querySelector(".input_video");
      const canvasElement = document.querySelector(".output_canvas");
      const canvasCtx = canvasElement.getContext("2d");

      const meme = document.getElementById("memeSound");

      let ultimoX = 0;
      let ultimoY = 0;

      function detectarMovimento(x, y) {
        let dx = x - ultimoX;
        let dy = y - ultimoY;

        let velocidade = Math.sqrt(dx * dx + dy * dy);

        if (velocidade > 80) {
          meme.currentTime = 0;
          meme.play();
        }

        ultimoX = x;
        ultimoY = y;
      }

      function onResults(results) {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;

        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

        canvasCtx.drawImage(
          results.image,
          0,
          0,
          canvasElement.width,
          canvasElement.height,
        );

        if (results.multiHandLandmarks) {
          for (const landmarks of results.multiHandLandmarks) {
            drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {
              color: "#00FF00",
              lineWidth: 4,
            });

            drawLandmarks(canvasCtx, landmarks, {
              color: "#FF0000",
              lineWidth: 2,
            });

            let dedo = landmarks[8];

            let x = dedo.x * canvasElement.width;
            let y = dedo.y * canvasElement.height;

            detectarMovimento(x, y);
          }
        }

        canvasCtx.restore();
      }

      const hands = new Hands({
        locateFile: (file) => {
          return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        },
      });

      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7,
      });

      hands.onResults(onResults);

      const camera = new Camera(videoElement, {
        onFrame: async () => {
          await hands.send({ image: videoElement });
        },

        width: 640,
        height: 480,
      });

      camera.start();
    </script>
  </body>
</html>

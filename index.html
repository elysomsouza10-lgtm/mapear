<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapeamento de Movimentos com Som</title>
    <style>
      body {
        margin: 0;
        background: #111;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      canvas {
        position: absolute;
      }
    </style>
  </head>
  <body>
    <video id="video" autoplay playsinline style="display: none"></video>
    <canvas id="canvas"></canvas>
    <audio
      id="sound"
      src="https://www.myinstants.com/media/sounds/tuturu.mp3"
    ></audio>

    <!-- TensorFlow.js e modelos -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection"></script>

    <script>
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const sound = document.getElementById("sound");

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      let lastY = null; // Para detectar movimentos verticais

      async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 640, height: 480 },
        });
        video.srcObject = stream;
        return new Promise(
          (resolve) => (video.onloadedmetadata = () => resolve(video)),
        );
      }

      async function main() {
        await setupCamera();

        // Modelo de detecção de mãos
        const model = handPoseDetection.SupportedModels.MediaPipeHands;
        const detector = await handPoseDetection.createDetector(model, {
          runtime: "tfjs",
          maxHands: 1,
        });

        async function detectHands() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          const hands = await detector.estimateHands(video);

          if (hands.length > 0) {
            const keypoints = hands[0].keypoints;
            const indexFinger = keypoints.find(
              (p) => p.name === "index_finger_tip",
            );

            if (indexFinger) {
              const x = indexFinger.x * (canvas.width / video.videoWidth);
              const y = indexFinger.y * (canvas.height / video.videoHeight);

              // Desenhar círculo no dedo indicador
              ctx.beginPath();
              ctx.arc(x, y, 12, 0, 2 * Math.PI);
              ctx.fillStyle = "cyan";
              ctx.fill();

              // Detecta movimento vertical rápido para tocar som
              if (lastY !== null && Math.abs(y - lastY) > 50) {
                sound.currentTime = 0;
                sound.play();
              }
              lastY = y;
            }
          }

          requestAnimationFrame(detectHands);
        }

        detectHands();
      }

      main();
    </script>
  </body>
</html>
